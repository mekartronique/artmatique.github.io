<div class="container" style="display:flex; justify-content:center; align-items:center; min-height:70vh;">
    <div class="card" style="width:100%; max-width:400px;">
        <h2 style="text-align:center; margin-bottom:20px;">Connexion</h2>
        <form style="display:flex; flex-direction:column; gap:15px;">
            <input type="text" placeholder="Utilisateur" style="padding:12px; border-radius:10px; border:1px solid #334155; background:var(--dark); color:white;">
            <input type="password" placeholder="Mot de passe" style="padding:12px; border-radius:10px; border:1px solid #334155; background:var(--dark); color:white;">
            <button class="btn-login" type="submit">Entrer dans l'univers</button>
        </form>
    </div>
</div>
